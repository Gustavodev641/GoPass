<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoPass — Eventos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* ---- Hero ---- */
  .hero {
    position: relative;
    overflow: hidden;
    padding: 72px 0 52px;
  }
  .hero-bg { position: absolute; inset: 0; pointer-events: none; }
  .hero-orb {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--primary) 0%, transparent 65%);
    opacity: 0.06;
    top: -250px; left: 50%;
    transform: translateX(-50%);
  }
  .hero-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px; font-weight: 600;
    color: var(--muted);
    margin-bottom: 22px;
    animation: fadeUp 0.5s ease;
  }
  .hero-chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 5.5vw, 68px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.035em;
    margin-bottom: 16px;
    animation: fadeUp 0.5s 0.05s ease both;
  }
  .hero-title em {
    font-style: normal;
    background: linear-gradient(135deg, var(--primary-light), #ff8c42);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: 17px;
    color: var(--muted);
    max-width: 500px;
    margin-bottom: 36px;
    line-height: 1.6;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  /* ---- Search ---- */
  .search-wrap {
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .search-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px;
    max-width: 900px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.3);
  }
  .search-field {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 0 14px;
    flex: 1;
    min-width: 150px;
    transition: border-color var(--t);
  }
  .search-field:focus-within { border-color: var(--primary); }
  .search-icon { color: var(--faint); font-size: 15px; flex-shrink: 0; }
  .search-input {
    background: none; border: none; outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 11px 0;
    width: 100%;
  }
  .search-input::placeholder { color: var(--faint); }
  .search-date { max-width: 170px; min-width: 140px; }
  .filter-pills { display: flex; gap: 6px; align-items: center; }
  .pill {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--t);
    white-space: nowrap;
    font-family: var(--font-body);
  }
  .pill.active, .pill:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* ---- Events section ---- */
  .events-section { padding: 48px 0 80px; }
  .section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    gap: 16px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .section-count { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ---- Grid ---- */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(308px, 1fr));
    gap: 20px;
  }

  /* ---- Event card ---- */
  .event-card {
    cursor: pointer;
    transition: all var(--t);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .event-card:hover {
    border-color: var(--border-h);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .event-img-wrap {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--surface-2);
    flex-shrink: 0;
  }
  .event-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
  }
  .event-card:hover .event-img { transform: scale(1.06); }
  .event-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 52px;
    color: var(--primary);
    background: linear-gradient(135deg, var(--surface-2), var(--bg));
    user-select: none;
  }
  .card-badge {
    position: absolute;
    top: 12px; left: 12px;
  }
  .event-body {
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 8px;
  }
  .event-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
  }
  .event-date-tag {
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--primary-light);
    font-size: 12px;
  }
  .meta-sep { color: var(--faint); }
  .event-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .event-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .event-footer {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Skeleton cards */
  .skeleton-card { overflow: hidden; pointer-events: none; }
  .sk-img { width: 100%; aspect-ratio: 16/9; }
  .sk-body { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 10px; }

  /* States */
  .state-box {
    text-align: center;
    padding: 90px 20px;
    color: var(--muted);
  }
  .state-emoji { font-size: 52px; display: block; margin-bottom: 18px; }
  .state-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .state-sub { font-size: 14px; margin-bottom: 20px; }

  /* ---- Pagination ---- */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 52px;
  }
  .page-arrow {
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--t);
    font-family: var(--font-body);
  }
  .page-arrow:hover:not(:disabled) { color: var(--text); border-color: var(--border-h); }
  .page-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-nums { display: flex; gap: 4px; }
  .page-num {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--t);
    font-family: var(--font-body);
  }
  .page-num:hover, .page-num.active {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }

  @media (max-width: 700px) {
    .events-grid { grid-template-columns: 1fr; }
    .search-bar { flex-direction: column; }
    .search-field { min-width: 100%; }
    .search-date { max-width: 100%; min-width: 100%; }
    .filter-pills { flex-wrap: wrap; }
    .section-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"><div class="hero-orb"></div><div class="hero-lines"></div></div>
  <div class="container hero-content">
    <div class="hero-chip"><span class="hero-chip-dot"></span>🎟 Marketplace de Eventos</div>
    <h1 class="hero-title">Descubra seu<br><em>próximo evento</em></h1>
    <p class="hero-sub">Encontre os melhores eventos presenciais e remotos do Brasil em um só lugar.</p>

    <div class="search-wrap">
      <div class="search-bar">
        <div class="search-field">
          <span class="search-icon">⌕</span>
          <input type="text" class="search-input" id="filterTitle" placeholder="Buscar por título..." oninput="applyFilters()" />
        </div>
        <div class="search-field">
          <span class="search-icon">◎</span>
          <input type="text" class="search-input" id="filterCity" placeholder="Cidade..." oninput="applyFilters()" />
        </div>
        <div class="search-field search-date">
          <span class="search-icon">📅</span>
          <input type="date" class="search-input" id="filterDate" onchange="applyFilters()" />
        </div>
        <div class="filter-pills">
          <button class="pill active" onclick="setRemote(null, this)">Todos</button>
          <button class="pill" onclick="setRemote(false, this)">📍 Presencial</button>
          <button class="pill" onclick="setRemote(true, this)">🌐 Remoto</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- EVENTS -->
<section class="events-section">
  <div class="container">
    <div class="section-header">
      <div>
        <h2 class="section-title">Próximos Eventos</h2>
        <p class="section-count" id="eventCount"></p>
      </div>
      <div id="adminCreateBtn" style="display:none">
        <a href="admin.html" class="btn btn-primary btn-sm">+ Criar Evento</a>
      </div>
    </div>

    <div id="eventsContainer">
      <!-- Content rendered by JS -->
    </div>

    <div class="pagination" id="pagination" style="display:none"></div>
  </div>
</section>

<script src="shared.js"></script>
<script>
  const PAGE_SIZE = 9;
  let allEvents = [];
  let filteredEvents = [];
  let currentPage = 0;
  let remoteFilter = null;

  renderNavbar('dashboard');

  const user = getUser();
  if (user?.role === 'ADMIN') document.getElementById('adminCreateBtn').style.display = 'block';

  // Load events
  async function loadEvents() {
    renderSkeletons();
    try {
      allEvents = await fetchEvents(0, 200);
      applyFilters();
    } catch (err) {
      renderError();
    }
  }

  function applyFilters() {
    currentPage = 0;
    const title = document.getElementById('filterTitle').value.toLowerCase();
    const city = document.getElementById('filterCity').value.toLowerCase();
    const date = document.getElementById('filterDate').value;

    filteredEvents = allEvents.filter(e => {
      if (title && !e.title.toLowerCase().includes(title)) return false;
      if (city && !(e.city || '').toLowerCase().includes(city)) return false;
      if (remoteFilter !== null && e.remote !== remoteFilter) return false;
      if (date && new Date(e.date) < new Date(date)) return false;
      return true;
    });

    document.getElementById('eventCount').textContent = `${filteredEvents.length} evento(s) encontrado(s)`;
    renderPage();
  }

  function setRemote(val, btn) {
    remoteFilter = val;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function renderPage() {
    const start = currentPage * PAGE_SIZE;
    const page = filteredEvents.slice(start, start + PAGE_SIZE);
    const container = document.getElementById('eventsContainer');

    if (filteredEvents.length === 0) { renderEmpty(); return; }

    container.innerHTML = `<div class="events-grid">${page.map((e, i) => cardHTML(e, i)).join('')}</div>`;
    renderPagination();
  }

  function cardHTML(ev, idx) {
    const imgPart = ev.imgUrl
      ? `<img src="${ev.imgUrl}" alt="${escHtml(ev.title)}" class="event-img" onerror="this.parentElement.innerHTML='<div class=\\'event-placeholder\\'>${escHtml(ev.title[0])}</div>'" />`
      : `<div class="event-placeholder">${escHtml(ev.title[0])}</div>`;

    const badgeClass = ev.remote ? 'badge-remote' : 'badge-presencial';
    const badgeText = ev.remote ? '🌐 Remoto' : '📍 Presencial';
    const locationPart = !ev.remote && ev.city ? `<span class="meta-sep">·</span><span>${escHtml(ev.city)}</span>` : '';
    const detailUrl = 'evento.html?id=' + ev.id;

    return `
      <div class="event-card card fade-up" style="animation-delay:${idx * 0.05}s"
        onclick="window.location.href='${detailUrl}'">
        <div class="event-img-wrap">
          ${imgPart}
          <div class="card-badge"><span class="badge ${badgeClass}">${badgeText}</span></div>
        </div>
        <div class="event-body">
          <div class="event-meta">
            <span class="event-date-tag">${formatDate(ev.date)}</span>
            ${locationPart}
          </div>
          <h3 class="event-title">${escHtml(ev.title)}</h3>
          ${ev.description ? `<p class="event-desc">${escHtml(ev.description)}</p>` : ''}
          <div class="event-footer">
            <a href="${detailUrl}" class="btn btn-outline btn-sm" onclick="event.stopPropagation()">Ver evento →</a>
          </div>
        </div>
      </div>`;
  }

  function renderSkeletons() {
    const container = document.getElementById('eventsContainer');
    container.innerHTML = `<div class="events-grid">${Array(6).fill(0).map(() => `
      <div class="card skeleton-card">
        <div class="skeleton sk-img"></div>
        <div class="sk-body">
          <div class="skeleton" style="height:12px;width:55%"></div>
          <div class="skeleton" style="height:19px;width:88%"></div>
          <div class="skeleton" style="height:12px;width:70%"></div>
          <div class="skeleton" style="height:12px;width:40%;margin-top:4px"></div>
        </div>
      </div>`).join('')}
    </div>`;
    document.getElementById('pagination').style.display = 'none';
  }

  function renderEmpty() {
    document.getElementById('eventsContainer').innerHTML = `
      <div class="state-box">
        <span class="state-emoji">🎪</span>
        <p class="state-title">Nenhum evento encontrado</p>
        <p class="state-sub">Tente ajustar os filtros de busca</p>
      </div>`;
    document.getElementById('pagination').style.display = 'none';
  }

  function renderError() {
    document.getElementById('eventsContainer').innerHTML = `
      <div class="state-box">
        <span class="state-emoji">⚠️</span>
        <p class="state-title">Não foi possível carregar</p>
        <p class="state-sub">Verifique se o back-end está rodando em localhost:8080</p>
        <button class="btn btn-outline btn-sm" onclick="loadEvents()">Tentar novamente</button>
      </div>`;
    document.getElementById('pagination').style.display = 'none';
  }

  function renderPagination() {
    const total = Math.ceil(filteredEvents.length / PAGE_SIZE);
    const pag = document.getElementById('pagination');
    if (total <= 1) { pag.style.display = 'none'; return; }
    pag.style.display = 'flex';
    const nums = Array.from({ length: Math.min(total, 7) }, (_, i) => i);
    pag.innerHTML = `
      <button class="page-arrow" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>← Anterior</button>
      <div class="page-nums">
        ${nums.map(p => `<button class="page-num ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p + 1}</button>`).join('')}
      </div>
      <button class="page-arrow" onclick="goPage(${currentPage + 1})" ${currentPage >= total - 1 ? 'disabled' : ''}>Próximo →</button>`;
  }

  function goPage(p) {
    currentPage = p;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function openEvent(url) {
    if (url && url !== '#') window.open(url, '_blank');
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadEvents();
</script>
</body>
</html>
